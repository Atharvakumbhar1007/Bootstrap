<!DOCTYPE html>
<html lang="en">

<head>
    <title>Googlepage</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .progress {
            margin-bottom: 15px;
            align-items: center;
        }

        .container {
            margin-top: 50px;
            align-content: center;
        }

        .btn-primary {
            margin-top: 50px;
            align-content: center;
        }

        .move-right {
            margin-left: 50px;
        }
    </style>
</head>

<body>

    <div class="container text-center">
        <h1>You've got 200GB of storage</h1>
        <h3 class="text-muted">Storage in Google Drive,Gmail, & Google Photos</h3>
    </div>
    <div class="d-flex justify-content-center mt-1">
        <button type="button" class="btn btn-primary">
            Get more storage</button>
    </div>

    <div class="move-right">
        <h2>102.58GB of 200GB used</h2>
    </div>

    <div class="progress" style="margin-left: 50px">
        <div class="progress-bar bg-primary" style="width: 5%">
            Free Space
        </div>
        <div class="progress-bar bg-danger" style="width: 10%">
            Warning
        </div>
        <div class="progress-bar bg-warning" style="width: 40%">
            Danger
        </div>
    </div>
    <div class="container m-5">
        <h6>Storage Details</h6>
        <div class="d-flex justify-content-between mt-3">
            <h5>Google Drive</h5>
            <h5>8.62 GB</h5>
        </div>
        <div class="d-flex justify-content-between mt-3">
            <h5>Gmail</h5>
            <h5>14.05 GB</h5>
        </div>
        <div class="d-flex justify-content-between mt-3">
            <h5>Google Photos</h5>
            <h5>79.89 GB</h5>
        </div>
        <div class="d-flex justify-content-between mt-3">
            <div class="btn-group">
                <button type="button" class="btn dropdown-toggle" data-bs-toggle="dropdown">Family Storage</button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#">2 Person</a></li>
                    <li><a class="dropdown-item" href="#">3 people</a></li>
                </ul>
            </div>
            <h5>0 GB</h5>
        </div>
    </div>
    </div>


</body>

</html>
