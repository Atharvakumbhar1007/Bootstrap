<!DOCTYPE html>
<html lang="en">

<head>
    <title>Profile Card</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bu
    ndle.min.js"></script>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: gray;
        }

        .img-thumbnail {
            width: 70%;
            border-radius: 80%;
            margin: 0 auto;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .card {

            padding: 20px;
            width: 300px;
            background: white;
            text-align: center;
            border-radius: 20px;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }

        .card-title {
            font-weight: bold;
            font-size: 1.5em;
        }

        button {
            padding: 10px 25px;
            border: none;
            border-radius: 25px;
        }

        button:hover {
            background-color: gray;
        }
    </style>

</head>

<body>
    <div class="card" style="width: 18rem; ">
        <img src="atharva.jpeg" class="img-thumbnail" alt="Cinque Terre">
        <div class="card-body">
            <h5 class="card-title">Profile Card</h5>
            <p class="card-text">I am Atharva Kumbhar. Software Engineering Student</p>
            <dl>
                <dt>Course</dt>
                <dd>Full Stack Development</dd>
            </dl>
            <button>Click</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous">
        </script>
</body>

</html>
