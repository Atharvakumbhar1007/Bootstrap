<!DOCTYPE html>
<html lang="en">

<head>
    <title>DISPLAY</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        span {
            display: inline-block;
            width: 70px;
            height: 70px;
            margin: 6px;
            background-color: #f9f9f9;
        }
    </style>
</head>

<body>

    <!-- BLOCK ELEMENT / DISPLAY -->

    <h2 class="section-title">3. Dispaly Utilities</h2>

    <div class="d-block bg-primry text-white p-3 mb-2">BLOCK ELEMENT</div>

    <span class="d-inline bg-success text-white p-2">Inline Element</span>

    <div class="d-none">Hidden Element</div>

    <div class="d-none d-md-block bg-warning p-3 mt-3">
        Visible only on medium screen and larger</div>
    </div>

</body>

</html>
