<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registration Form</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Modal -->
<div class="modal fade" id="loginModel">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h4 class="modal-title">Registration</h4>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <form id="loginForm" class="was-validated">

          <div class="input-group mb-3">
            <span class="input-group-text">Name</span>
            <input type="text" class="form-control" placeholder="First Name" required>
            <input type="text" class="form-control" placeholder="Last Name" required>
          </div>

          <div class="mb-3">
            <label>Email:</label>
            <input type="email" class="form-control" required>
            <div class="invalid-feedback">Enter valid email</div>
          </div>

          <div class="mb-3">
            <label>Password:</label>
            <input type="password" class="form-control" required>
            <div class="invalid-feedback">Enter password</div>
          </div>

          <div class="mb-3">
            <label>Contact:</label>
            <input type="text" class="form-control" required>
          </div>

          <div class="mb-3">
            <label>Gender:</label>
            <select class="form-select">
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>

          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">Remember me</label>
          </div>

          <!-- Alert -->
          <div id="loginAlert" class="alert alert-success d-none">
            Form submitted successfully!
          </div>

          <button type="submit" class="btn btn-primary">Register</button>

        </form>

      </div>

    </div>
  </div>
</div>

<!-- Button to open modal -->
<div class="container mt-3">
  <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#loginModel">
    Open Registration Form
  </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const form = document.getElementById("loginForm");
  const loginAlert = document.getElementById("loginAlert");

  form.addEventListener("submit", (ev) => {

    if (!form.checkValidity()) {
      ev.preventDefault();
      ev.stopPropagation();
      form.classList.add("was-validated");
    } else {
      ev.preventDefault(); // prevent actual submit

      loginAlert.classList.remove("d-none");
      form.reset();
      form.classList.remove("was-validated");

      setTimeout(() => {
        loginAlert.classList.add("d-none");
      }, 5000);
    }

  });

});
</script>

</body>
</html>
