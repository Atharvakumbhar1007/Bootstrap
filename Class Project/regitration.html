<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registration Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container mt-3">
  <h2 style="color: rgb(30, 123, 30);">Registration form</h2>
  <form action="/action_page.php" class="was-validated">
    <div class="input-group mb-3 mt-3">
        <span class="input-group-text">Name</span>
        <input type="text" class="form-control" id="first name" placeholder="Enter your First Name"name="first name" required>
        <input type="text" class="form-control" id="last name" placeholder="Enter your Last Name"name="last name" required>
        <div class="valid-feedback">Valid.</div>
    </div>
    <div class="mb-3 mt-3">
      <label for="email">Email:</label>
      <input type="email" class="form-control" id="email" placeholder="Enter email" name="email" required>
      <div class="valid-feedback">Valid.</div>
       <div class="invalid-feedback">Please enter a valid email address.</div>
    </div>
    <div class="mb-3 mt-3">
      <label for="pwd">Password:</label>
      <input type="password" class="form-control" id="pwd" placeholder="Enter password" name="pswd" required>
      <div class="valid-feedback">Valid.</div>
       <div class="invalid-feedback">Please enter a password.</div>
    </div>
    <div class="mb-3 mt-3">
        <label for="contact">Contact Number:</label>
        <input type="text" class="form-control" id="contact" placeholder="Enter your contact number" name="contact" required>
        <div class="valid-feedback">Valid.</div>
         <div class="invalid-feedback">Please enter a contact number.</div>
    </div>
    <div class="mb-3 mt-3">
        <label for="gender">Gender:</label>
        <select class="form-select" id="gender" name="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select>
    </div>
    <div class="form-check mb-3">
      <label class="form-check-label">
        <input class="form-check-input" type="checkbox" name="remember"> Remember me
      </label>
    </div>
    <button type="submit" class="btn btn-primary">Register</button>
  </form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
