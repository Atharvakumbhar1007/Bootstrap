<!DOCTYPE html>
<html lang="en">

<head>
    <title>Alert Links</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <div class="alert alert-primary">
        <strong>Primary</strong>Indicates an <a href="#" class="alert-link"> important action
    </div>
    <div class="alert alert-secondary">
        <strong>Secondary</strong>Indicates an <a href="#" class="alert-link"> important action
    </div>
    <div class="alert alert-dark">
        <strong>Primary</strong> Dark Grey alert.
    </div>
    <div class="alert alert-light">
        <strong>Primary</strong> light Grey alert.
    </div>
    <div class="alert alert-success">
        <strong>Success</strong>You should <a href="#" class="alert-link">Read this MESSAGE
    </div>

</body>

</html>
