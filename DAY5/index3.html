<!DOCTYPE html>
<html lang="en">

<head>
    <title>Block Level Button</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <div class="container mt-3">
        <h2>Block Level Button</h2>
        <p>if you have many block level buttons, you can space between thenm with the .gap-* class:</p>
        <div class="d-grid gap-3">
            <button type="button" class="btn btn-primary">Full-Width Button</button>
            <button type="button" class="btn btn-primary">Full-Width Button</button>
            <button type="button" class="btn btn-primary">Full-Width Button</button>
        </div>
    </div>

    <div class="container mt-3 center-button">
        <style>
            .center-button {
                display: flex;
                justify-content: center;
                gap: 7px;
            }
        </style>
        <button type="button" class="btn btn-primary active">Active Primary</button>
        <button type="button" class="btn btn-primary" disabled>Disabled Primary</button>
        <a href="#" class="btn btn-primary disable">Disable Link</a>
    </div>
</body>

</html>
