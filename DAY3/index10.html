<!DOCTYPE html>
<html lang="en">

<head>
    <title>Bootstrap Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: "Times New Roman", Times, serif;
        }
    </style>

</head>

<body>

    <div class="container mt-4">

        <h2>Search & Sort Table</h2>

        <input class="form-control mb-3" id="searchInput" type="text" placeholder="Search name...">

        <table class="table table-bordered" id="dataTable">

            <thead>
                <tr>
                    <th onclick="sortTable(0)">#</th>
                    <th onclick="sortTable(1)">Firstname</th>
                    <th onclick="sortTable(2)">Lastname</th>
                    <th onclick="sortTable(3)">Age</th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <td>1</td>
                    <td>Atharva</td>
                    <td>Kumbhar</td>
                    <td>22</td>
                </tr>

                <tr>
                    <td>2</td>
                    <td>Riya</td>
                    <td>Sharma</td>
                    <td>21</td>
                </tr>

                <tr>
                    <td>3</td>
                    <td>Rahul</td>
                    <td>Patil</td>
                    <td>23</td>
                </tr>

            </tbody>

        </table>

    </div>

    <script>

        document.getElementById("searchInput").addEventListener("keyup", function () {

            let filter = this.value.toUpperCase();
            let rows = document.querySelector("#dataTable tbody").rows;

            for (let i = 0; i < rows.length; i++) {

                let name = rows[i].cells[1].textContent.toUpperCase();

                rows[i].style.display = name.indexOf(filter) > -1 ? "" : "none";

            }

        });

        function sortTable(n) {

            let table = document.getElementById("dataTable");
            let rows = Array.from(table.rows).slice(1);
            let asc = table.classList.contains("asc");

            rows.sort((a, b) => {

                let x = a.cells[n].innerText;
                let y = b.cells[n].innerText;

                return asc ? x.localeCompare(y, undefined, { numeric: true })
                    : y.localeCompare(x, undefined, { numeric: true });

            });

            rows.forEach(row => table.appendChild(row));

            table.classList.toggle("asc");

        }

    </script>

</body>

</html>
