<!DOCTYPE html>
<html lang="en">

<head>
    <title>Bootstrap Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            font-family: "Times New Roman", Times, serif;
        }
    </style>
</head>

<body>
    <h2 class="section-title">6.Data Table with Sorting and Filtering</h2>

    <input type="text" id="searchinput" class="form-control mb-3" placeholder="Search name...">

    <table class="table table-bordered table-hover" id="dat Table">
        <thead class="table-dark">
            <tr>
                <th onclick="sortTable(0)">ID ⬍</th>
                <th onclick="sortTable(1)">Name ⬍</th>
                <th onclick="sortTable(2)">Department ⬍</th>
                <th onclick="sortTable(3)">Salary ⬍</th>
            </tr>

        </thead>

        <tbody>

            <tr>
                <td>1</td>
                <td>Arjun</td>
                <td>IT</td>
                <td>70000</td>
            </tr>

            <tr>
                <td>2</td>
                <td>Sneha</td>
                <td>HR</td>
                <td>50000</td>
            </tr>

            <tr>
                <td>3</td>
                <td>Raj</td>
                <td>Finance</td>
                <td>65000</td>
            </tr>

            <tr>
                <td>4</td>
                <td>Karan</td>
                <td>IT</td>
                <td>72000</td>
            </tr>

        </tbody>
    </table>
</body>

</html>
